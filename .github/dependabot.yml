version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    groups:
      types:
        patterns:
          - "@types/*"
      semantic-release:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
      commitlint:
        patterns:
          - "@commitlint/*"
      dev-tooling:
        patterns:
          - "@biomejs/*"
          - "vitest"
          - "tsx"
          - "typescript"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore
      include: scope
